name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-forge/setup-miniconda@v2
        with:
          python-version: ${{ matrix.python }}
          activate-environment: test
          channels: conda-forge,defaults

      - name: Install MKL
        run: conda install -y mkl-devel

      - name: Install package
        run: |
          export MKLROOT=$CONDA_PREFIX
          pip install -e ".[test]"

      - name: Run tests
        run: pytest -v tests/
