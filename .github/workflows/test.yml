name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install MKL
        run: |
          sudo apt-get update
          sudo apt-get install -y libmkl-dev

      - name: Install package
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -v tests/

  test-windows:
    strategy:
      fail-fast: false
      matrix:
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}

      - name: Install MKL
        run: pip install mkl-devel mkl-include mkl

      - name: Install package
        run: pip install -e ".[test]"

      - name: Run tests
        run: pytest -v tests/
