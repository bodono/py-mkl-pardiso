name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python }}
          activate-environment: test
          channels: conda-forge,defaults

      - name: Install MKL
        run: conda install -y mkl-devel mkl-static

      - name: Set MKLROOT
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "MKLROOT=$CONDA_PREFIX/Library" >> $GITHUB_ENV
          else
            echo "MKLROOT=$CONDA_PREFIX" >> $GITHUB_ENV
          fi

      - name: Install package
        run: pip install -e ".[test]"

      - name: Verify import
        run: python -c "import pymklpardiso; print('OK:', pymklpardiso.PardisoSolver)"

      - name: Run tests
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            export LD_LIBRARY_PATH=$CONDA_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
          fi
          pytest -v tests/
