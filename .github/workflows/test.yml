name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.10", "3.11", "3.12", "3.13", "3.14"]

    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          python-version: ${{ matrix.python }}
          activate-environment: test
          channels: conda-forge
          channel-priority: strict

      - name: Install MKL
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            conda install -y -n test pip mkl-devel mkl-static
          else
            conda install -y -n test pip mkl-devel
          fi
          conda list -n test mkl

      - name: Set MKLROOT
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            echo "MKLROOT=$CONDA/envs/test/Library" >> $GITHUB_ENV
          else
            echo "MKLROOT=$CONDA/envs/test" >> $GITHUB_ENV
          fi

      - name: Install package
        run: conda run --no-capture-output -n test python -m pip install -e ".[test]"

      - name: Run tests
        run: conda run --no-capture-output -n test python -m pytest -v tests/
