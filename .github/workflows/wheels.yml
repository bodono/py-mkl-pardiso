name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: x86_64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* cp314t-*"
          CIBW_SKIP: "pp* *-musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Install Miniforge once, then use it to install MKL into a
          # known prefix. Static linking embeds MKL into the wheel.
          CIBW_BEFORE_ALL_LINUX: >
            curl -fsSL https://github.com/conda-forge/miniforge/releases/latest/download/Miniforge3-Linux-x86_64.sh -o /tmp/miniforge.sh &&
            bash /tmp/miniforge.sh -b -p /opt/mkl &&
            /opt/mkl/bin/conda install -y -p /opt/mkl mkl-devel mkl-static

          CIBW_ENVIRONMENT_LINUX: >
            MKLROOT=/opt/mkl
            PYMKLPARDISO_STATIC=1

          CIBW_TEST_REQUIRES: pytest scipy
          CIBW_TEST_COMMAND: pytest {project}/tests -v

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build-wheels-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          channels: conda-forge,defaults

      - name: Install MKL
        shell: bash -el {0}
        run: |
          conda install -y mkl-devel mkl-static
          echo "MKL_PREFIX=$CONDA_PREFIX/Library" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: AMD64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* cp314t-*"
          CIBW_SKIP: "pp*"

          CIBW_ENVIRONMENT_WINDOWS: >
            MKLROOT=${{ env.MKL_PREFIX }}

          CIBW_TEST_REQUIRES: pytest scipy
          CIBW_TEST_COMMAND: pytest {project}/tests -v

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: wheelhouse/*.whl

  publish:
    needs: [build-sdist, build-wheels-linux, build-wheels-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
