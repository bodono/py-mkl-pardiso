name: Build wheels

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v7
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: x86_64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* cp314t-*"
          CIBW_SKIP: "pp* *-musllinux*"
          CIBW_MANYLINUX_X86_64_IMAGE: manylinux_2_28

          # Use Intel's oneAPI Linux packages directly rather than conda MKL.
          # The wheel is built against dynamic MKL and auditwheel bundles the
          # required shared libraries into the repaired artifact.
          CIBW_BEFORE_ALL_LINUX: >
            dnf install -y dnf-plugins-core &&
            dnf config-manager --add-repo https://yum.repos.intel.com/oneapi &&
            rpm --import https://yum.repos.intel.com/intel-gpg-keys/GPG-PUB-KEY-INTEL-SW-PRODUCTS.PUB &&
            dnf install -y intel-oneapi-mkl-devel

          CIBW_ENVIRONMENT_LINUX: >
            MKLROOT=/opt/intel/oneapi/mkl/latest
            LD_LIBRARY_PATH=/opt/intel/oneapi/mkl/latest/lib/intel64:/opt/intel/oneapi/mkl/latest/lib

          CIBW_REPAIR_WHEEL_COMMAND_LINUX: >
            LD_LIBRARY_PATH=/opt/intel/oneapi/mkl/latest/lib/intel64:/opt/intel/oneapi/mkl/latest/lib auditwheel repair -w {dest_dir} {wheel}

          CIBW_TEST_REQUIRES: pytest scipy
          CIBW_TEST_COMMAND: pytest {project}/tests -v

      - name: Verify Linux wheels bundle MKL shared libraries
        run: python3 tests/check_linux_wheel_bundled.py wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-linux
          path: wheelhouse/*.whl

  build-wheels-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          activate-environment: build
          channels: https://software.repos.intel.com/python/conda/,conda-forge,defaults

      - name: Install MKL
        shell: bash -el {0}
        run: |
          # Use Intel's conda channel directly on Windows, then bundle the
          # resulting MKL DLLs into the wheel via delvewheel.
          conda install -y -c https://software.repos.intel.com/python/conda/ -c conda-forge mkl mkl-devel
          echo "MKL_PREFIX=$CONDA_PREFIX/Library" >> $GITHUB_ENV

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4
        env:
          CIBW_ARCHS: AMD64
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-* cp314t-*"
          CIBW_SKIP: "pp*"
          CIBW_BEFORE_BUILD_WINDOWS: python -m pip install delvewheel
          CIBW_REPAIR_WHEEL_COMMAND_WINDOWS: >
            python -m delvewheel repair --add-path "${{ env.MKL_PREFIX }}\\bin" -w {dest_dir} {wheel}

          CIBW_ENVIRONMENT_WINDOWS: >
            MKLROOT=${{ env.MKL_PREFIX }}

          CIBW_TEST_REQUIRES: pytest scipy
          CIBW_TEST_COMMAND: pytest {project}/tests -v

      - name: Verify Windows wheels bundle MKL DLLs
        run: |
          python -m pip install pefile
          python tests/check_windows_wheel_bundled.py wheelhouse

      - uses: actions/upload-artifact@v7
        with:
          name: wheels-windows
          path: wheelhouse/*.whl

  publish:
    needs: [build-sdist, build-wheels-linux, build-wheels-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v8
        with:
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
