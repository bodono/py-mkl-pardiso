name: Build wheels

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  build-sdist:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build sdist
        run: pipx run build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz

  build-wheels:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            cibw_archs: x86_64
          - os: windows-latest
            cibw_archs: AMD64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: ${{ matrix.cibw_archs }}
          CIBW_BUILD: "cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_SKIP: "pp* *-musllinux*"

          # Install MKL static libs + headers via pip before each build.
          # mkl-static provides true static archives so MKL is embedded in
          # the wheel — users don't need MKL installed at runtime.
          CIBW_BEFORE_BUILD: pip install mkl-static mkl-include

          # Linux: force static linking via full .a archive paths.
          CIBW_ENVIRONMENT_LINUX: PYMKLPARDISO_STATIC=1

          # Windows: MSVC automatically static-links the .lib files from
          # mkl-static (they are real static libs, not import libs).

          CIBW_TEST_REQUIRES: pytest
          CIBW_TEST_COMMAND: pytest {project}/tests -v

      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.cibw_archs }}
          path: wheelhouse/*.whl

  publish:
    needs: [build-sdist, build-wheels]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write

    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: dist/

      - uses: pypa/gh-action-pypi-publish@release/v1
