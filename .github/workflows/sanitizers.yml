name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  asan:
    name: AddressSanitizer
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          activate-environment: test
          channels: conda-forge
          channel-priority: strict

      - name: Install MKL
        run: conda install -y mkl-devel

      - name: Set MKLROOT
        run: echo "MKLROOT=$CONDA_PREFIX" >> $GITHUB_ENV

      - name: Install with ASAN
        env:
          # Use system compiler (not conda's) so ASAN flags work.
          CC: gcc
          CXX: g++
          CFLAGS: "-fsanitize=address -fno-omit-frame-pointer -g"
          CXXFLAGS: "-fsanitize=address -fno-omit-frame-pointer -g"
          LDFLAGS: "-fsanitize=address"
        run: |
          pip install pybind11 setuptools
          pip install -e ".[test]" -v --no-build-isolation

      - name: Run tests under ASAN
        env:
          # intercept_tls_get_addr=0: avoid crash when ASAN intercepts
          # __cxa_throw across non-ASAN conda Python and ASAN extension.
          ASAN_OPTIONS: "detect_leaks=0:halt_on_error=1:intercept_tls_get_addr=0:log_path=/tmp/asan"
        run: |
          ASAN_RT=$(gcc -print-file-name=libasan.so)
          set +e
          LD_PRELOAD="$ASAN_RT" pytest -v tests/
          TEST_EXIT=$?
          set -e
          echo "=== ASAN reports ==="
          cat /tmp/asan.* 2>/dev/null || echo "No ASAN log files found"
          if ls /tmp/asan.* 1>/dev/null 2>&1; then exit 1; fi
          exit $TEST_EXIT

  valgrind:
    name: Valgrind memcheck
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v6

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.12"
          activate-environment: test
          channels: conda-forge
          channel-priority: strict

      - name: Install MKL and Valgrind
        run: |
          conda install -y mkl-devel
          sudo apt-get update && sudo apt-get install -y valgrind

      - name: Set MKLROOT
        run: echo "MKLROOT=$CONDA_PREFIX" >> $GITHUB_ENV

      - name: Install with debug symbols
        env:
          CFLAGS: "-g -O1"
          CXXFLAGS: "-g -O1"
        run: pip install -e ".[test]" -v

      - name: Run tests under Valgrind
        run: |
          valgrind \
            --tool=memcheck \
            --leak-check=no \
            --track-origins=yes \
            --error-exitcode=1 \
            --suppressions=valgrind-python.supp \
            python -m pytest -v tests/
        timeout-minutes: 30
