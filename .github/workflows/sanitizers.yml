name: Sanitizers

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  valgrind:
    name: Valgrind memcheck
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash -el {0}

    steps:
      - uses: actions/checkout@v7

      - name: Set up Conda
        uses: conda-incubator/setup-miniconda@v4
        with:
          python-version: "3.12"
          activate-environment: test
          channels: conda-forge
          channel-priority: strict

      - name: Install MKL and Valgrind
        run: |
          conda install -y -n test pip mkl-devel
          sudo apt-get update && sudo apt-get install -y valgrind

      - name: Set MKLROOT
        run: echo "MKLROOT=$CONDA/envs/test" >> $GITHUB_ENV

      - name: Install with debug symbols
        env:
          CFLAGS: "-g -O1"
          CXXFLAGS: "-g -O1"
        run: conda run --no-capture-output -n test python -m pip install -e ".[test]" -v

      - name: Run tests under Valgrind
        run: |
          conda run --no-capture-output -n test valgrind \
            --tool=memcheck \
            --leak-check=no \
            --track-origins=yes \
            --error-exitcode=1 \
            --suppressions=valgrind-python.supp \
            python -m pytest -v tests/
        timeout-minutes: 30
